<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/qvjz8QFW/Logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style/style.css?v=13" />
</head>

<body>
  <div class="lock-screen" id="lock-screen">
    <div class="lock-content">
      <div class="lock-image">
        <img src="https://media.tenor.com/ttDeZJ3hMLsAAAAC/dancing-cat-dance.gif" alt="Pass Image">
      </div>
      <div class="lock-form">
        <div class="lock-icon">
          <i class="fa-solid fa-cake-candles"></i>
        </div>
        <div class="pass-dots" id="pass-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="numpad">
          <button class="num-btn" data-value="1">1</button>
          <button class="num-btn" data-value="2">2</button>
          <button class="num-btn" data-value="3">3</button>
          <button class="num-btn" data-value="4">4</button>
          <button class="num-btn" data-value="5">5</button>
          <button class="num-btn" data-value="6">6</button>
          <button class="num-btn" data-value="7">7</button>
          <button class="num-btn" data-value="8">8</button>
          <button class="num-btn" data-value="9">9</button>
          <button class="num-btn blank"></button>
          <button class="num-btn" data-value="0">0</button>
          <button class="num-btn delete-btn"><i class="fa-solid fa-delete-left"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="container main-content-hidden" id="main-content">
    <div class="menu">
      <button class="menu-item" id="btn-music">
        <span class="icon"><img src="style/img/asset/music.png" alt="Music" /></span>
        <span>Music</span>
      </button>
      <button class="menu-item" id="btn-letter">
        <span class="icon"><img src="style/img/asset/letter.png" alt="Letter" /></span>
        <span>Letter</span>
      </button>
      <button class="menu-item" id="btn-image">
        <span class="icon stats-icon-menu"><i class="fa-solid fa-chart-simple"></i></span>
        <span>Stats</span>
      </button>
      <button class="menu-item" id="btn-gift">
        <span class="icon"><img src="style/img/asset/gift.png" alt="Gift" /></span>
        <span>Gift</span>
      </button>
      <button class="menu-item cake-menu-btn" id="btn-cake">
        <span class="icon"><span style="font-size:3.5rem">🎂</span></span>
        <span>Thổi Nến</span>
      </button>
    </div>

  </div>

  <button class="reset-lock-btn" id="btn-reset-lock">
    <i class="fa-solid fa-lock"></i>
  </button>

  <div class="overlay" id="letter-overlay">
    <div class="letter-modal">
      <button class="close-btn" id="close-letter"><i class="fa-solid fa-xmark"></i></button>
      <div class="letter-content">
        <div class="letter-body" id="letter-body"></div>
      </div>
      <img src="https://media.tenor.com/ttDeZJ3hMLsAAAAC/dancing-cat-dance.gif" alt="Decoration"
        class="letter-gif" />
    </div>
  </div>

  <div class="overlay" id="music-overlay">
    <div class="music-modal">
      <button class="close-btn" id="close-music"><i class="fa-solid fa-xmark"></i></button>
      <div class="spotify-player">
        <div class="player-header">
          <img src="style/img/asset/music.png" alt="Spotify" class="spotify-logo" />
          <span>Music Player</span>
        </div>
        <div class="now-playing">
          <div class="song-info">
            <div class="album-art" id="album-art">
              <img src="" alt="Album Art" />
            </div>
            <div class="song-details">
              <h3 id="song-title">Select a song</h3>
              <p id="song-artist">Artist name</p>
            </div>
          </div>

          <div class="player-controls">
            <div class="progress-container">
              <span id="current-time">0:00</span>
              <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
              </div>
              <span id="duration">0:00</span>
            </div>

            <div class="control-buttons">
              <button class="ctrl-btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
              <button class="ctrl-btn play-pause" id="play-pause-btn">
                <i class="fa-solid fa-play"></i>
              </button>
              <button class="ctrl-btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
            </div>
          </div>
        </div>

        <div class="song-list" id="song-list"></div>
      </div>
      <img src="https://media.tenor.com/T0_KIdp7E6MAAAAC/cat-vibe.gif" alt="Decoration" class="music-gif" />
    </div>
  </div>

  <div class="overlay" id="image-overlay">
    <div class="image-modal">
      <button class="close-btn" id="close-image"><i class="fa-solid fa-xmark"></i></button>
      <div class="stats-header">
        <h2>📊 BẢNG BÁO CÁO TÌNH BẠN</h2>
        <p>(FRIENDSHIP STATS - LEVEL VÔ TRI MAX)</p>
      </div>
      <div class="stats-container" id="stats-container">
        <!-- Stats cards will be injected here by JS -->
      </div>
      <div class="gallery-gif-wrapper top">
        <img src="https://media.tenor.com/yjJSxStyYpsAAAAC/napoleon-dynamite-party-animal.gif" alt="Decoration"
          class="gallery-gif" />
      </div>
      <div class="gallery-gif-wrapper bottom">
        <img src="https://media.tenor.com/M6L187-I88QAAAAC/happy-birthday.gif" alt="Decoration" class="gallery-gif" />
      </div>
    </div>
  </div>

  <div class="overlay" id="lightbox-overlay" style="z-index: 2000">
    <div class="lightbox-content">
      <button class="close-btn" id="close-lightbox"><i class="fa-solid fa-xmark"></i></button>
      <img src="" alt="Full View" id="lightbox-img" />
    </div>
  </div>

  <div class="overlay" id="gift-overlay">
    <div class="gift-modal" id="gift-modal-element">
      <button class="close-btn" id="close-gift"><i class="fa-solid fa-xmark"></i></button>
      <button class="fullscreen-btn" id="fullscreen-gift"><i class="fa-solid fa-expand"></i></button>
      <iframe src="style/gift/gift.html" frameborder="0" class="gift-iframe"></iframe>
    </div>
  </div>

  <!-- Birthday Cake Modal -->
  <div class="overlay" id="cake-overlay">

    <!-- SVG Bunting (string of colorful triangular flags) -->
    <div class="cake-bunting">
      <svg viewBox="0 0 1200 70" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,10 Q150,55 300,10 Q450,55 600,10 Q750,55 900,10 Q1050,55 1200,10" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none"/>
        <polygon points="60,10 100,10 80,45"  fill="#ff6b6b" opacity="0.85"/>
        <polygon points="160,28 200,28 180,60" fill="#ffd93d" opacity="0.85"/>
        <polygon points="260,10 300,10 280,45" fill="#6bcb77" opacity="0.85"/>
        <polygon points="360,28 400,28 380,60" fill="#4d96ff" opacity="0.85"/>
        <polygon points="460,10 500,10 480,45" fill="#ff6bff" opacity="0.85"/>
        <polygon points="560,28 600,28 580,60" fill="#ff9f43" opacity="0.85"/>
        <polygon points="660,10 700,10 680,45" fill="#a29bfe" opacity="0.85"/>
        <polygon points="760,28 800,28 780,60" fill="#fd79a8" opacity="0.85"/>
        <polygon points="860,10 900,10 880,45" fill="#00cec9" opacity="0.85"/>
        <polygon points="960,28 1000,28 980,60" fill="#ffd93d" opacity="0.85"/>
        <polygon points="1060,10 1100,10 1080,45" fill="#ff6b6b" opacity="0.85"/>
      </svg>
    </div>

    <!-- CSS Balloons -->
    <div class="cake-balloon" style="--bcolor:#ff6b6b; --spd:3.2s; --delay:0s;   left:3%;  top:12%"></div>
    <div class="cake-balloon" style="--bcolor:#ffd93d; --spd:3.8s; --delay:0.6s; left:8%;  top:40%"></div>
    <div class="cake-balloon" style="--bcolor:#6bcb77; --spd:4.1s; --delay:1.3s; left:4%;  top:66%"></div>
    <div class="cake-balloon" style="--bcolor:#4d96ff; --spd:3.5s; --delay:0.3s; right:3%; top:15%"></div>
    <div class="cake-balloon" style="--bcolor:#ff6bff; --spd:3.9s; --delay:0.9s; right:7%; top:43%"></div>
    <div class="cake-balloon" style="--bcolor:#ff9f43; --spd:4.3s; --delay:1.6s; right:4%; top:68%"></div>

    <!-- Sparkle stars -->
    <div class="cake-sparkle" style="--spd:2.1s; --delay:0s;   left:16%; top:8%">✨</div>
    <div class="cake-sparkle" style="--spd:2.6s; --delay:0.7s; right:16%;top:7%">⭐</div>
    <div class="cake-sparkle" style="--spd:1.9s; --delay:1.1s; left:22%; top:84%">🌟</div>
    <div class="cake-sparkle" style="--spd:2.4s; --delay:0.4s; right:20%;top:82%">✨</div>

    <div class="cake-modal">
      <button class="close-btn" id="close-cake"><i class="fa-solid fa-xmark"></i></button>
      <div class="hbd-header">
        <span class="hbd-happy">Happy</span>
        <span class="hbd-birthday">Birthday!</span>
      </div>
      <div class="cake-scene" id="cake-scene">
        <canvas id="confetti-canvas"></canvas>
        <div class="cake-css" id="cake-css">
          <div class="candle-wrap" id="candle-wrap">
            <div class="flame" id="flame"></div>
            <div class="candle-body"></div>
          </div>
          <div class="layer layer-top"></div>
          <div class="icing"></div>
          <span class="drip drip1"></span>
          <span class="drip drip2"></span>
          <span class="drip drip3"></span>
          <div class="layer layer-middle"></div>
          <div class="layer layer-bottom"></div>
          <div class="cake-plate"></div>
        </div>
      </div>
      <div class="cake-controls">
        <div class="blow-instruction" id="blow-instruction">
          <p>🎤 Thổi vào mic để tắt nến...</p>
          <button class="blow-btn" id="blow-btn">💨 Bấm để thổi</button>
        </div>
        <div class="wish-container" id="wish-container">
          <div class="wish-text" id="wish-text"></div>
          <button class="relight-btn" id="relight-btn">🕯️ Thắp lại nến</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio-player"></audio>
  <audio id="pop-sound" src="style/pop.mp3"></audio>

  <script src="style/script.js?v=10"></script>
</body>

</html>
